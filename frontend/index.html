<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskAPI — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f13;
      --surface:   #13161d;
      --panel:     #191d27;
      --border:    #252a38;
      --border2:   #2e3447;
      --text:      #e2e6f0;
      --muted:     #6b7592;
      --accent:    #4fffb0;
      --accent2:   #00d4ff;
      --danger:    #ff4d6d;
      --warn:      #ffc94a;
      --info:      #7b8cde;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'DM Sans', sans-serif;
      --radius:    8px;
      --shadow:    0 4px 24px rgba(0,0,0,0.5);
    }

    html, body, #root { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Layout ── */
    .app-shell { display: flex; height: 100vh; overflow: hidden; }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
      transition: width .2s;
    }
    .sidebar-logo {
      padding: 22px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo .wordmark {
      font-family: var(--mono);
      font-size: 17px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .sidebar-logo .tagline {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      font-family: var(--mono);
    }
    .sidebar-nav { flex: 1; padding: 12px 0; }
    .nav-section-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 10px 20px 4px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      cursor: pointer;
      font-size: 14px;
      color: var(--muted);
      border-left: 2px solid transparent;
      transition: all .15s;
      user-select: none;
    }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,.03); }
    .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(79,255,176,.06); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .user-badge {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-avatar {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 12px;
      color: var(--bg);
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 13px; font-weight: 500; color: var(--text); truncate: true; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .btn-logout {
      background: none; border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: color .15s;
      display: flex;
    }
    .btn-logout:hover { color: var(--danger); }

    /* ── Main content ── */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }
    .topbar-title { font-size: 16px; font-weight: 600; flex: 1; }
    .page-body { flex: 1; overflow-y: auto; padding: 28px; }

    /* ── Auth page ── */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 60% 40% at 50% -10%, rgba(79,255,176,.08) 0%, transparent 60%);
    }
    .auth-card {
      width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      box-shadow: var(--shadow);
    }
    .auth-logo {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .auth-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .auth-tabs {
      display: flex;
      gap: 0;
      background: var(--panel);
      border-radius: var(--radius);
      padding: 3px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all .15s;
      color: var(--muted);
      border: none;
      background: none;
    }
    .auth-tab.active { background: var(--border2); color: var(--text); }

    /* ── Forms ── */
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 12px; font-family: var(--mono); color: var(--muted); margin-bottom: 6px; letter-spacing: .5px; text-transform: uppercase; }
    input, select, textarea {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,255,176,.1);
    }
    select option { background: var(--panel); }
    textarea { resize: vertical; min-height: 80px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all .15s;
      font-family: var(--sans);
      white-space: nowrap;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      width: 100%;
      justify-content: center;
      font-weight: 600;
    }
    .btn-primary:hover:not(:disabled) { background: #3de09a; }
    .btn-secondary { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--border2); background: var(--border); }
    .btn-danger { background: rgba(255,77,109,.15); color: var(--danger); border: 1px solid rgba(255,77,109,.3); }
    .btn-danger:hover { background: rgba(255,77,109,.25); }
    .btn-ghost { background: transparent; color: var(--muted); padding: 6px 10px; }
    .btn-ghost:hover { color: var(--text); background: rgba(255,255,255,.05); }
    .btn-sm { padding: 5px 12px; font-size: 13px; }
    .btn-icon { padding: 6px; border-radius: 6px; }

    /* ── Alerts ── */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .alert-error { background: rgba(255,77,109,.1); border: 1px solid rgba(255,77,109,.3); color: #ff8fa3; }
    .alert-success { background: rgba(79,255,176,.1); border: 1px solid rgba(79,255,176,.3); color: var(--accent); }
    .alert-info { background: rgba(0,212,255,.1); border: 1px solid rgba(0,212,255,.2); color: var(--accent2); }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
    }
    .stat-label { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; line-height: 1; }
    .stat-value.green  { color: var(--accent); }
    .stat-value.yellow { color: var(--warn); }
    .stat-value.blue   { color: var(--accent2); }
    .stat-value.red    { color: var(--danger); }
    .stat-value.purple { color: var(--info); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      font-weight: 500;
      text-align: left;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--mono);
      font-weight: 500;
      letter-spacing: .3px;
    }
    .badge-pending    { background: rgba(255,201,74,.12); color: var(--warn); border: 1px solid rgba(255,201,74,.25); }
    .badge-in_progress{ background: rgba(0,212,255,.12);  color: var(--accent2); border: 1px solid rgba(0,212,255,.25); }
    .badge-completed  { background: rgba(79,255,176,.12); color: var(--accent); border: 1px solid rgba(79,255,176,.25); }
    .badge-cancelled  { background: rgba(255,77,109,.1);  color: var(--danger); border: 1px solid rgba(255,77,109,.2); }
    .badge-high   { background: rgba(255,77,109,.1);  color: var(--danger); }
    .badge-medium { background: rgba(255,201,74,.1);  color: var(--warn); }
    .badge-low    { background: rgba(107,117,146,.15); color: var(--muted); }
    .badge-admin { background: rgba(123,140,222,.15); color: var(--info); border: 1px solid rgba(123,140,222,.3); }
    .badge-user  { background: rgba(107,117,146,.15); color: var(--muted); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      animation: fadeIn .15s;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 480px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: slideUp .2s;
    }
    .modal-header {
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 17px; font-weight: 600; }
    .modal-body { padding: 20px 24px; }
    .modal-footer {
      padding: 0 24px 20px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .toolbar-filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .toolbar-filters select { width: auto; padding: 7px 10px; font-size: 13px; }
    .search-input { max-width: 240px; padding: 8px 12px; font-size: 13px; }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 18px;
      font-size: 13px;
      color: var(--muted);
    }
    .page-btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: all .15s;
    }
    .page-btn:hover { border-color: var(--border2); }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }
    .page-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }

    /* ── Misc ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    .loading-center {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 200px; gap: 14px;
      color: var(--muted); font-size: 14px;
    }
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 180px; gap: 10px;
      color: var(--muted);
    }
    .empty-state svg { opacity: .3; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .text-muted { color: var(--muted); }
    .text-mono { font-family: var(--mono); font-size: 13px; }
    .tag { display: inline-block; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-family: var(--mono); font-size: 11px; color: var(--muted); }

    /* ── Animations ── */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeInUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .fade-in { animation: fadeInUp .25s ease; }

    /* ── API Tester ── */
    .api-url-bar {
      display: flex; align-items: center; gap: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 13px;
      margin-bottom: 14px;
    }
    .method-badge {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .method-GET    { background: rgba(79,255,176,.15); color: var(--accent); }
    .method-POST   { background: rgba(0,212,255,.15);  color: var(--accent2); }
    .method-PATCH  { background: rgba(255,201,74,.15); color: var(--warn); }
    .method-DELETE { background: rgba(255,77,109,.1);  color: var(--danger); }
    .response-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.7;
      max-height: 320px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .status-200 { color: var(--accent); }
    .status-201 { color: var(--accent2); }
    .status-4xx, .status-5xx { color: var(--danger); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar { width: 0; position: absolute; z-index: 50; height: 100%; }
      .sidebar.open { width: 220px; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ─── Config ──────────────────────────────────────────────────────────────
    const API_BASE = window.API_BASE || 'http://localhost:5000/api/v1';

    // ─── API Client ──────────────────────────────────────────────────────────
    const api = {
      _token: null,
      setToken(t) { this._token = t; },
      clearToken() { this._token = null; },

      async request(method, path, body, noAuth = false) {
  const headers = { 'Content-Type': 'application/json' };

  const stored = JSON.parse(sessionStorage.getItem('auth') || '{}');

  if (stored.token && !noAuth) {
    headers['Authorization'] = `Bearer ${stored.token}`;
  }

  let res = await fetch(`${API_BASE}${path}`, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });

  let data = {};
  try { data = await res.json(); } catch {}

  // 🔥 HANDLE TOKEN EXPIRED
  if (res.status === 401 && data?.message?.includes('expired')) {

    console.log("🔄 Token expired → refreshing...");

    const refreshRes = await fetch(`${API_BASE}/auth/refresh`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refreshToken: stored.refreshToken }),
    });

    const refreshData = await refreshRes.json();

    if (refreshRes.ok) {
      // ✅ Save new tokens
      const newAuth = {
        user: stored.user,
        token: refreshData.data.accessToken,
        refreshToken: refreshData.data.refreshToken,
      };

      sessionStorage.setItem('auth', JSON.stringify(newAuth));

      // 🔥 Retry original request
      return this.request(method, path, body, noAuth);

    } else {
      // ❌ Refresh failed → logout
      sessionStorage.removeItem('auth');
      window.location.reload();
    }
  }

  return { ok: res.ok, status: res.status, data };
},

      get: (path) => api.request('GET', path),
      post: (path, body, noAuth) => api.request('POST', path, body, noAuth),
      patch: (path, body) => api.request('PATCH', path, body),
      delete: (path) => api.request('DELETE', path),
    };

    // ─── Icons ───────────────────────────────────────────────────────────────
    const Icon = ({ name, size = 16 }) => {
      const icons = {
        home: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
        tasks: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>,
        users: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
        api: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M8 9l3 3-3 3M13 15h3M2 4h20v16H2z" strokeLinecap="round" strokeLinejoin="round"/></svg>,
        plus: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
        edit: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
        trash: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>,
        logout: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>,
        x: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
        check: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>,
        refresh: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,

      useEffect(() => {
        const t = setTimeout(onDismiss, 3500);
        return () => clearTimeout(t);
      }, []);
      return (
        <div style={{ position:'fixed', bottom:24, right:24, zIndex:999 }}>
          <div className={`alert alert-${type}`} style={{ boxShadow: 'var(--shadow)', minWidth: 260, animation: 'slideUp .2s' }}>

            {msg}
          </div>
        </div>

    // ─── useToast ─────────────────────────────────────────────────────────────
    const useToast = () => {
      const [toast, setToast] = useState(null);
      const show = (msg, type = 'success') => setToast({ msg, type, id: Date.now() });
      const dismiss = () => setToast(null);
      const ToastEl = toast ? <Toast key={toast.id} msg={toast.msg} type={toast.type} onDismiss={dismiss} /> : null;
      return { show, ToastEl };

            const msg = res.data.errors

        setLoading(true); setError('');

          ? await api.patch(`/tasks/${task.id}`, form)
          : await api.post('/tasks', form);
        if (res.ok) { onSave(res.data.data.task); }
        else { setError(res.data.errors ? res.data.errors.map(e=>e.message).join(', ') : res.data.message); }
        setLoading(false);
      };

      return (
        <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>

        if (filters.priority) params.set('priority', filters.priority);

        { label:'List my tasks', method:'GET', path:'/tasks' },

        { label:'All users (admin)', method:'GET', path:'/users' },

        const start = Date.now();
        try {
          const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
          const url = path.startsWith('/../') ? `http://localhost:5000${path.replace('/../','/') }` : `${API_BASE}${path}`;
          const res = await fetch(url, { method, headers, body: body && method!=='GET' ? body : undefined });
          const data = await res.json();
          const ms = Date.now() - start;
          setResponse({ status: res.status, data, ms });
        } catch(e) {
          setResponse({ error: e.message });
        }
        setLoading(false);
      };

      const statusClass = response ? (response.status < 300 ? 'status-200' : response.status < 400 ? 'status-201' : 'status-4xx') : '';

      return (
        <div className="fade-in">
          <div style={{ marginBottom: 18 }}>
            <div style={{ fontSize: 13, color:'var(--muted)', marginBottom: 12 }}>Quick presets:</div>
            <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
              {presets.map(p => (
                <button key={p.label} className="btn btn-secondary btn-sm" onClick={() => { setMethod(p.method); setPath(p.path); setBody(p.body||''); }}>
                  <span className={`method-badge method-${p.method}`}>{p.method}</span>{p.label}
                </button>
              ))}
            </div>
          </div>

          <div className="card" style={{ marginBottom: 16 }}>
            <div style={{ display:'flex', gap:8, marginBottom:12 }}>
              <select value={method} onChange={e => setMethod(e.target.value)} style={{ width:110 }}>
                {['GET','POST','PATCH','DELETE'].map(m => <option key={m}>{m}</option>)}
              </select>
              <input value={path} onChange={e => setPath(e.target.value)} placeholder="/tasks" style={{ flex:1 }} />
              <button className="btn btn-primary btn-sm" style={{ width:'auto', minWidth:80 }} onClick={run} disabled={loading}>
                {loading ? <span className="spinner" style={{width:13,height:13}}/> : <Icon name="send" size={13}/>}
                Send
              </button>
            </div>
            <div className="api-url-bar" style={{ fontSize:12 }}>
              <span className={`method-badge method-${method}`}>{method}</span>
              <span style={{color:'var(--muted)'}}>{API_BASE}</span>
              <span style={{color:'var(--text)'}}>{path}</span>
            </div>
            {method !== 'GET' && (
              <div className="form-group" style={{ marginBottom:0 }}>
                <label>Request Body (JSON)</label>
                <textarea value={body} onChange={e => setBody(e.target.value)} placeholder='{"key": "value"}' style={{fontFamily:'var(--mono)', fontSize:13, minHeight:100}} />
              </div>
            )}
          </div>

          {response && (
            <div className="card fade-in">
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:12 }}>
                <span style={{ fontFamily:'var(--mono)', fontWeight:600 }} className={statusClass}>
                  {response.error ? '⚠ Error' : `HTTP ${response.status}`}
                </span>
                {response.ms && <span style={{ fontSize:12, color:'var(--muted)' }}>{response.ms}ms</span>}
              </div>
              <div className="response-box">
                {response.error ? response.error : JSON.stringify(response.data, null, 2)}
              </div>
            </div>
          )}

          <div style={{ marginTop:16, padding:14, background:'var(--panel)', borderRadius:8, border:'1px solid var(--border)' }}>
            <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.8px', marginBottom:8 }}>Current Token</div>
            <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--accent2)', wordBreak:'break-all', lineHeight:1.6 }}>{token}</div>
            <div style={{ marginTop:8 }}>
              <a href={`${API_BASE.replace('/api/v1','')}/api/docs`} target="_blank" style={{ color:'var(--accent)', fontSize:13, textDecoration:'none' }}>
                → Open Swagger Docs ↗
              </a>
            </div>
          </div>
        </div>
      );
    };

    // ─── Shell / Router ───────────────────────────────────────────────────────
    const PAGES = {
      dashboard: { label: 'Dashboard', icon: 'home', adminOnly: false },
      tasks:     { label: 'Tasks',     icon: 'tasks', adminOnly: false },
      users:     { label: 'Users',     icon: 'users', adminOnly: true },
      api:       { label: 'API Tester', icon: 'api',  adminOnly: false },
    };

    const AppShell = ({ user, token, onLogout }) => {
      const [page, setPage] = useState('dashboard');

      const navPages = Object.entries(PAGES).filter(([, v]) => !v.adminOnly || user.role === 'admin');

      const renderPage = () => {
        switch(page) {
          case 'dashboard': return <DashboardPage user={user} />;
          case 'tasks':     return <TasksPage user={user} />;
          case 'users':     return user.role === 'admin' ? <UsersPage /> : null;
          case 'api':       return <ApiTesterPage token={token} />;
          default:          return null;
        }
      };

      return (
        <div className="app-shell">
          {/* Sidebar */}
          <aside className="sidebar">
            <div className="sidebar-logo">
              <div className="wordmark">⬡ TaskAPI</div>
              <div className="tagline">v1.0 · REST · JWT · RBAC</div>
            </div>
            <nav className="sidebar-nav">
              <div className="nav-section-label">Navigation</div>
              {navPages.map(([key, val]) => (
                <div key={key} className={`nav-item ${page===key?'active':''}`} onClick={() => setPage(key)}>
                  <Icon name={val.icon} size={15} />
                  {val.label}
                  {key==='users' && <span className="badge badge-admin" style={{marginLeft:'auto',fontSize:9,padding:'1px 6px'}}>Admin</span>}
                </div>
              ))}
            </nav>
            <div className="sidebar-footer">
              <div className="user-badge">
                <div className="user-avatar">{user.name[0].toUpperCase()}</div>
                <div className="user-info">
                  <div className="user-name">{user.name}</div>
                  <div className="user-role">{user.role}</div>
                </div>
                <button className="btn-logout" onClick={onLogout} title="Logout"><Icon name="logout" size={15}/></button>
              </div>
            </div>
          </aside>

          {/* Main */}
          <div className="main-content">
            <div className="topbar">
              <div className="topbar-title">{PAGES[page]?.label}</div>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span className="tag">{API_BASE}</span>
                <span className={`badge badge-${user.role}`}>{user.role}</span>
              </div>
            </div>
            <div className="page-body">
              {renderPage()}
            </div>
          </div>
        </div>
      );
    };

    // ─── Root App ─────────────────────────────────────────────────────────────
    const App = () => {
      const [auth, setAuth] = useState(() => {
        try {
          const saved = sessionStorage.getItem('auth');
          return saved ? JSON.parse(saved) : null;
        } catch { return null; }
      });

      const handleAuth = (user, token, refreshToken) => {
        api.setToken(token);
        const data = { user, token, refreshToken };
        sessionStorage.setItem('auth', JSON.stringify(data));
        setAuth(data);
      };

      const handleLogout = async () => {
        if (auth?.refreshToken) {
          await api.post('/auth/logout', { refreshToken: auth.refreshToken }).catch(() => {});
        }
        api.clearToken();
        sessionStorage.removeItem('auth');
        setAuth(null);
      };

      useEffect(() => {
        if (auth?.token) {
          api.setToken(auth.token);
        }
      }, [auth]);

      if (!auth) return <AuthPage onAuth={handleAuth} />;
      return <AppShell user={auth.user} token={auth.token} onLogout={handleLogout} />;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
